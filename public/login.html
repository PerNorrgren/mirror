<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deeper Mindfulness</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; font-family:'Georgia',serif; background:#0a0f0d; display:flex; align-items:center; justify-content:center; }

    .slideshow { position:fixed; inset:0; z-index:0; }
    .slide { position:absolute; inset:0; background-size:cover; background-position:center; opacity:0; transition:opacity 3s ease-in-out; }
    .slide.active { opacity:1; }
    .veil { position:fixed; inset:0; z-index:1; background:rgba(0,0,0,0.5); }

    .panel { position:relative; z-index:2; width:100%; max-width:380px; padding:20px; }

    .glass {
      background:rgba(255,255,255,0.07);
      backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:20px; padding:40px 36px 36px;
      display:flex; flex-direction:column; gap:24px;
    }

    .wordmark { text-align:center; }
    .wordmark-main { font-size:11px; letter-spacing:0.25em; text-transform:uppercase; color:rgba(255,255,255,0.4); display:block; }
    .wordmark-sub { font-size:20px; color:rgba(255,255,255,0.8); display:block; margin-top:6px; }

    .form { display:flex; flex-direction:column; gap:14px; }

    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
    .field input {
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
      border-radius:10px; padding:12px 14px; font-size:15px;
      color:rgba(255,255,255,0.85); font-family:'Georgia',serif; outline:none;
      transition:border-color 0.2s;
    }
    .field input:focus { border-color:rgba(180,230,200,0.4); }
    .field input::placeholder { color:rgba(255,255,255,0.2); }

    .error { font-size:13px; color:rgba(255,140,120,0.85); text-align:center; min-height:18px; }

    .submit-btn {
      width:100%; padding:13px; border-radius:10px;
      border:1px solid rgba(180,230,200,0.3);
      background:rgba(180,230,200,0.1);
      color:rgba(180,230,200,0.85); font-size:13px;
      letter-spacing:0.12em; text-transform:uppercase;
      cursor:pointer; transition:all 0.2s; font-family:'Georgia',serif;
    }
    .submit-btn:hover { background:rgba(180,230,200,0.18); }
    .submit-btn:disabled { opacity:0.5; cursor:not-allowed; }

    .footer-note { text-align:center; font-size:11px; color:rgba(255,255,255,0.2); }
  /* Role chooser modal */
  .role-modal { display:none; position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); align-items:center; justify-content:center; padding:20px; }
  .role-modal.visible { display:flex; }
  .role-inner { background:#0f1a16; border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:36px 32px; width:100%; max-width:340px; display:flex; flex-direction:column; gap:16px; text-align:center; }
  .role-inner h3 { font-size:20px; color:rgba(255,255,255,0.85); font-weight:normal; }
  .role-inner p { font-size:14px; color:rgba(255,255,255,0.4); line-height:1.7; }
  .role-btn { width:100%; padding:14px; border-radius:10px; font-family:'Georgia',serif; font-size:14px; letter-spacing:0.08em; cursor:pointer; transition:all 0.2s; }
  .role-btn-primary { border:1px solid rgba(180,230,200,0.35); background:rgba(180,230,200,0.1); color:rgba(180,230,200,0.85); }
  .role-btn-primary:hover { background:rgba(180,230,200,0.2); }
  .role-btn-secondary { border:1px solid rgba(255,255,255,0.12); background:none; color:rgba(255,255,255,0.45); }
  .role-btn-secondary:hover { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <div class="slideshow" id="slideshow"></div>
  <div class="veil"></div>

  <div class="panel">
    <div class="glass">
      <div class="wordmark">
        <span class="wordmark-main">Deeper Mindfulness</span>
        <span class="wordmark-sub">Sign in</span>
      </div>

      <div class="form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="your@email.com" autocomplete="email"/>
        </div>
        <div class="field">
          <label>Password</label>
          <div style="position:relative">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px"/>
            <button type="button" id="togglePw" onclick="togglePassword()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;padding:4px;line-height:1;display:flex;align-items:center">
              <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="error" id="error"></div>
        <button class="submit-btn" id="submitBtn">Sign in</button>

        <div style="display:flex;align-items:center;gap:12px;margin-top:4px">
          <div style="flex:1;height:1px;background:rgba(255,255,255,0.08)"></div>
          <span style="font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:0.08em">or</span>
          <div style="flex:1;height:1px;background:rgba(255,255,255,0.08)"></div>
        </div>

        <button onclick="enterAsGuest()" style="width:100%;padding:13px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:none;color:rgba(255,255,255,0.4);font-size:13px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;font-family:'Georgia',serif;" onmouseover="this.style.background='rgba(255,255,255,0.06)';this.style.color='rgba(255,255,255,0.65)'" onmouseout="this.style.background='none';this.style.color='rgba(255,255,255,0.4)'">Continue as guest</button>
      </div>

      <div class="footer-note">Deeper Mindfulness · Per Norrgren</div>
    </div>
  </div>

  <script>
    const slides = [
      'https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=1600&q=80',
      'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=1600&q=80',
      'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1600&q=80',
      'https://images.unsplash.com/photo-1448375240586-882707db888b?w=1600&q=80',
      'https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=1600&q=80',
    ];
    const ss = document.getElementById('slideshow');
    const slideEls = slides.map((url, i) => {
      const d = document.createElement('div');
      d.className = 'slide' + (i === 0 ? ' active' : '');
      d.style.backgroundImage = `url('${url}')`;
      ss.appendChild(d); return d;
    });
    let cur = 0;
    setInterval(() => {
      slideEls[cur].classList.remove('active');
      cur = (cur + 1) % slideEls.length;
      slideEls[cur].classList.add('active');
    }, 9000);

    // Check for error/message in URL
    const params = new URLSearchParams(location.search);
    if (params.get('error') === 'invalid') {
      document.getElementById('error').textContent = 'Email or password not recognised.';
    }
    if (params.get('error') === 'session') {
      document.getElementById('error').textContent = 'Session expired. Please sign in again.';
    }

    function togglePassword() {
      const input     = document.getElementById('password');
      const eyeOpen   = document.getElementById('eyeOpen');
      const eyeClosed = document.getElementById('eyeClosed');
      const btn       = document.getElementById('togglePw');
      if (input.type === 'password') {
        input.type = 'text';
        eyeOpen.style.display   = 'none';
        eyeClosed.style.display = '';
        btn.style.color = 'rgba(180,230,200,0.6)';
      } else {
        input.type = 'password';
        eyeOpen.style.display   = '';
        eyeClosed.style.display = 'none';
        btn.style.color = 'rgba(255,255,255,0.3)';
      }
    }

    function enterAsGuest() {
      window.location.href = '/guest/';
    }

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submitBtn');
      const errorEl  = document.getElementById('error');

      if (!email || !password) { errorEl.textContent = 'Please enter email and password.'; return; }

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errorEl.textContent = '';

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (data.chooseRole) {
        // Dual-role user — show chooser modal
        document.getElementById('roleModalName').textContent = 'You have access to both a practice space and the facilitator area.';
        document.getElementById('roleModal').classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      } else if (data.redirect) {
        window.location.href = data.redirect;
      } else {
        errorEl.textContent = data.error || 'Something went wrong.';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }

    function goToRole(role) {
      const map = { client: '/client/', facilitator: '/facilitator/', admin: '/admin/' };
      window.location.href = map[role] || '/login';
    }

    document.getElementById('submitBtn').addEventListener('click', doLogin);
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
  </script>
<!-- Role chooser modal — shown when user has both facilitator and client roles -->
<div class="role-modal" id="roleModal">
  <div class="role-inner">
    <h3>Welcome back</h3>
    <p id="roleModalName"></p>
    <p style="font-size:13px;color:rgba(255,255,255,0.3)">Where would you like to go?</p>
    <button class="role-btn role-btn-primary" onclick="goToRole('client')">My Practice</button>
    <button class="role-btn role-btn-secondary" onclick="goToRole('facilitator')">Facilitator</button>
  </div>
</div>

</body>
</html>
